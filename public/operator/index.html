<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spawn Internet — Operator</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand"><div class="globe"></div><div><b>SPAWN</b><small>OPERATOR</small></div></div>
    <div class="navlink active" data-sec="overview" onclick="nav('overview')"><span class="dot"></span>Overview</div>
    <div class="navlink" data-sec="devices" onclick="nav('devices')"><span class="dot"></span>My Machines</div>
    <div class="navlink" data-sec="collections" onclick="nav('collections')"><span class="dot"></span>Collections</div>
    <div class="spacer"></div>
    <div class="navlink" onclick="logout()"><span class="dot"></span>Sign out</div>
  </aside>
  <main class="main">
    <div class="topbar"><h1 class="grad-text">Operator</h1><span class="pill" id="whoami">…</span></div>

    <section data-section="overview">
      <div class="grid stats">
        <div class="card stat accent-2"><div class="label">My Machines</div><div class="value" id="o-machines">0</div></div>
        <div class="card stat accent-3"><div class="label">Online Now</div><div class="value" id="o-online">0</div></div>
        <div class="card stat accent-1"><div class="label">Active Sessions</div><div class="value" id="o-sessions">0</div></div>
      </div>
    </section>

    <section data-section="devices" class="hidden">
      <div class="card"><table><thead><tr><th>Device</th><th>Location</th><th>Status</th><th>Last online</th></tr></thead><tbody id="devTable"></tbody></table></div>
    </section>

    <section data-section="collections" class="hidden">
      <div class="card" style="margin-bottom:18px"><h3 style="margin-top:0">Record Collection</h3>
        <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
          <div><label>Device</label><select id="c_device"></select></div>
          <div><label>Amount (₱)</label><input id="c_amount" type="number" step="0.01"></div>
          <div><label>Date</label><input id="c_date" type="date"></div>
          <div><label>Notes</label><input id="c_notes"></div>
        </div>
        <button class="btn btn-primary" style="margin-top:14px" onclick="addCol()">Save collection</button>
      </div>
      <div class="card"><table><thead><tr><th>Date</th><th>Device</th><th>Amount</th><th>Notes</th></tr></thead><tbody id="colTable"></tbody></table></div>
    </section>
  </main>
</div>
<script src="/js/api.js"></script>
<script>
let DEVICES = [];
async function boot(){ const p=await requireRole(['operator','admin']); if(!p) return;
  document.getElementById('whoami').textContent=p.full_name||p.email;
  document.getElementById('c_date').value=new Date().toISOString().slice(0,10); nav('overview'); }
function nav(s){ document.querySelectorAll('.navlink').forEach(n=>n.classList.toggle('active',n.dataset.sec===s));
  document.querySelectorAll('[data-section]').forEach(x=>x.classList.toggle('hidden',x.dataset.section!==s));
  ({overview:loadOverview,devices:loadDevices,collections:loadCollections}[s]||(()=>{}))(); }

async function loadOverview(){ const [{devices},stats]=await Promise.all([API.get('/devices'),API.get('/admin/stats')]);
  DEVICES=devices; document.getElementById('o-machines').textContent=devices.length;
  document.getElementById('o-online').textContent=devices.filter(d=>d.status==='online').length;
  document.getElementById('o-sessions').textContent=stats.active_sessions; }

async function loadDevices(){ const {devices}=await API.get('/devices'); DEVICES=devices;
  document.getElementById('devTable').innerHTML=devices.map(d=>`
    <tr><td><b>${d.device_name}</b></td><td>${d.location||'—'}</td>
    <td><span class="badge ${d.status}">${d.status}</span></td><td>${fmtDate(d.last_online)}</td></tr>`).join('')
    || '<tr><td colspan="4" style="color:var(--muted)">No machines assigned.</td></tr>'; }

async function loadCollections(){ if(!DEVICES.length){const {devices}=await API.get('/devices');DEVICES=devices;}
  document.getElementById('c_device').innerHTML=DEVICES.map(d=>`<option value="${d.id}">${d.device_name}</option>`).join('');
  const {collections}=await API.get('/collections');
  document.getElementById('colTable').innerHTML=collections.map(c=>`
    <tr><td>${c.collection_date}</td><td>${c.vendo_devices?.device_name||'—'}</td><td>${peso(c.amount)}</td><td>${c.notes||''}</td></tr>`).join('')
    || '<tr><td colspan="4" style="color:var(--muted)">No collections yet.</td></tr>'; }

async function addCol(){ const body={device_id:document.getElementById('c_device').value,amount:document.getElementById('c_amount').value,
    collection_date:document.getElementById('c_date').value,notes:document.getElementById('c_notes').value};
  if(!body.amount) return toast('Enter amount','err');
  try{ await API.post('/collections',body); toast('Saved'); document.getElementById('c_amount').value='';document.getElementById('c_notes').value=''; loadCollections(); }catch(e){ toast(e.message,'err'); } }
boot();
</script>
</body>
</html>
