<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>Spawn Internet</title><style>
:root{--bg:#070709;--panel:#14141c;--panel-2:#1b1b26;--line:#272735;--txt:#eef0f6;--muted:#9aa0b4;--muted-2:#6b7088;--r1:#ff2d55;--r2:#ff9500;--r3:#ffd60a;--r4:#34c759;--r5:#00c7be;--r6:#0a84ff;--r7:#5e5ce6;--r8:#bf5af2;--ok:#34c759;--bad:#ff453a;--grad:linear-gradient(90deg,var(--r1),var(--r2),var(--r3),var(--r4),var(--r5),var(--r6),var(--r7),var(--r8));--shadow:0 10px 40px rgba(0,0,0,.5)}
*{box-sizing:border-box}body{margin:0;background:#070709;color:var(--txt);font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}
.portal{width:100%;max-width:430px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:var(--shadow)}
.grad-text{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.grad-bar{height:4px;background:var(--grad);border-radius:99px;margin:0 0 4px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-weight:600;padding:12px 20px;border-radius:12px;font-size:14px;font-family:inherit;color:#fff;width:100%}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted);font-size:13px;padding:9px 16px}
.btn-ghost:hover{border-color:var(--r6);color:var(--r6)}
.logo-wrap{text-align:center;margin-bottom:10px}
.globe-lg{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;background:conic-gradient(var(--r1),var(--r4),var(--r6),var(--r8),var(--r1));animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wordmark{font-size:24px;font-weight:700;letter-spacing:.04em}
.wordmark small{display:block;font-size:11px;letter-spacing:.5em;color:var(--r6);margin-top:2px}
.timer{font-size:48px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;margin:4px 0 2px}
.timer.live{text-shadow:0 0 24px rgba(52,199,89,.4)}
.sl{text-align:center;color:var(--muted);margin-bottom:16px;font-size:14px}.sl b{color:var(--ok)}
.grad-bar{height:4px;background:var(--grad);border-radius:99px;margin:0 0 16px}
.pricing-wrap{margin:16px 0 4px}
.pricing-title{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted-2);text-align:center;margin-bottom:10px}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:8px}
.price-card{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center}
.price-coin{font-size:20px;font-weight:700;color:var(--r3);line-height:1}
.price-label{font-size:10px;color:var(--muted-2);margin-top:2px}
.price-mins{font-size:13px;font-weight:600;color:var(--ok);margin-top:4px}
.admin-link{margin-top:14px;text-align:center}
#toast{position:fixed;bottom:24px;right:24px;z-index:99;display:flex;flex-direction:column;gap:10px}
.t{background:var(--panel-2);border:1px solid var(--line);padding:12px 16px;border-radius:12px;box-shadow:var(--shadow);font-size:13px;animation:si .25s ease}
.t.ok{border-left:4px solid var(--ok)}.t.err{border-left:4px solid var(--bad)}
@keyframes si{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
.sm{display:flex;justify-content:space-between;margin-top:16px;font-size:12px;color:var(--muted)}
.info-box{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:16px;font-size:13px;color:var(--muted);text-align:center;line-height:1.6}
.info-box b{color:var(--txt)}
</style></head><body>

    <div class="price-card"><div class="price-coin">&#8369;5</div><div class="price-label">per coin</div><div class="price-mins" id="p5">50m</div></div>

<script>
const RY='https://spawn-vendo-cloud-production-4f63.up.railway.app';
const P=new URLSearchParams(location.search);
const CI=P.get('clientip')||'';
let CM=sessionStorage.getItem('sm')||'';
document.getElementById('ml').textContent=CI?'IP: '+CI:(CM?'MAC: '+CM.replace('MAC:',''):'');
function hms(s){s=Math.max(0,Math.floor(s));var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),x=s%60;return[h,m,x].map(function(v){return String(v).padStart(2,'0');}).join(':');}
function minsLabel(m){return m>=60?Math.floor(m/60)+'hr'+(m%60?' '+m%60+'m':''):m+'m';}
function toast(m,t){t=t||'ok';var h=document.getElementById('toast');var e=document.createElement('div');e.className='t '+t;e.textContent=m;h.appendChild(e);setTimeout(function(){e.remove();},3200);}
async function api(mth,path,body){var r=await fetch(RY+'/api'+path,{method:mth,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});var j=await r.json().catch(function(){return{};});if(!r.ok||j.success===false)throw new Error(j.error||'HTTP '+r.status);return j.data;}
function durLbl(sec){
  sec=Math.max(0,Math.floor(sec));
  if(sec>=86400&&sec%86400===0){var d=sec/86400;return d+(d>1?'days':'day');}
  var h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60);
  if(h>0)return h+'hr'+(m?' '+m+'m':'');
  return m+'m';
}
async function loadPricing(){
  try{
    var d=await api('GET','/pricing');
    var grid=document.getElementById('pricingGrid');
    if(!grid)return;
    if(d.tiers&&d.tiers.length){
      grid.innerHTML=d.tiers.map(function(t){
        return '<div class="price-card"><div class="price-coin">&#8369;'+Number(t.amount)+'</div><div class="price-label">per coin</div><div class="price-mins">'+durLbl(t.seconds)+'</div></div>';
      }).join('');
    }else{
      grid.innerHTML='<div style="grid-column:1/-1;color:var(--muted-2);font-size:13px;text-align:center">No pricing set yet.</div>';
    }
  }catch(e){}
}
loadPricing();
var rem=0,tick=null;
function rT(){var t=document.getElementById('timer');t.textContent=hms(rem);t.classList.toggle('live',rem>0);document.getElementById('sl').innerHTML=rem>0?'You are <b>online</b>':'Insert a coin to get online';}
function sT(){clearInterval(tick);tick=setInterval(function(){if(rem>0){rem--;rT();}},1000);}
var ls=Date.now();
function mS(){ls=Date.now();}
setInterval(function(){var s=Math.floor((Date.now()-ls)/1000);document.getElementById('sy').textContent=s<5?'Synced just now':'Synced '+s+'s ago';},1000);
async function poll(){
  if(!CM)return;
  try{
    var d=await api('GET','/coin/session/'+encodeURIComponent(CM));
    var sv=d.remaining_seconds||0;
    if(Math.abs(sv-rem)>2)rem=sv;
    rT();mS();
  }catch(e){}
}
setInterval(poll,5000);
rT();sT();poll();
</script></body></html>
