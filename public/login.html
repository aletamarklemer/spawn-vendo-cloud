      </div>
    </div>

<script src="/js/api.js"></script>
<script>
function togglePw() {
  const input = document.getElementById('password');
  const btn = document.getElementById('pwToggleBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

async function doLogin(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email||!password) return toast('Enter email and password','err');
  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try{
    const d = await API.post('/auth/login',{ email, password });
    API.setToken(d.token); API.setProfile(d.profile);
    location.href = '/admin';
  }catch(e){
    toast(e.message,'err');
    btn.textContent = 'Sign in'; btn.disabled = false;
  }
}
document.getElementById('loginBtn').onclick = doLogin;
document.getElementById('password').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
document.getElementById('email').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('password').focus(); });
if(API.token()){ API.get('/auth/me').then(d=>{ if(d?.profile) location.href='/admin'; }).catch(()=>API.clear()); }
</script>
